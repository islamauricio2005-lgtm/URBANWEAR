<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrinho - UrbanWear</title>
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/base.css"> 
  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family: Arial, Helvetica, sans-serif;
      background:#fff;
      color:#111;
      padding:40px;
    }

    .cart-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:50px;
      border-bottom:1px solid #ddd;
      padding-bottom:20px;
    }

    .cart-header h1{
      font-size:32px;
      letter-spacing:2px;
      font-weight:300;
    }

    .back-btn{
      text-decoration:none;
      color:#111;
      border:1px solid #111;
      padding:12px 18px;
      transition:0.3s;
    }

    .back-btn:hover{
      background:#111;
      color:#fff;
    }

    #cart-items{
      display:flex;
      flex-direction:column;
      gap:30px;
    }

    .item{
      display:flex;
      gap:25px;
      border-bottom:1px solid #eee;
      padding-bottom:30px;
      align-items:center;
    }

    .item img{
      width:180px;
      height:240px;
      object-fit:cover;
    }

    .item-info{
      flex:1;
    }

    .category{
      font-size:12px;
      color:#777;
      text-transform:uppercase;
      letter-spacing:1px;
      margin-bottom:10px;
    }

    .item-info h3{
      font-size:20px;
      font-weight:400;
      margin-bottom:15px;
    }

    .price{
      font-size:18px;
      margin-bottom:20px;
    }

    .remove-btn{
      background:none;
      border:none;
      color:#777;
      cursor:pointer;
      font-size:14px;
      transition:0.3s;
    }

    .remove-btn:hover{
      color:#000;
    }

    .cart-footer{
      margin-top:50px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      border-top:1px solid #ddd;
      padding-top:30px;
    }

    .total{
      font-size:24px;
      font-weight:300;
    }

    .checkout-btn{
      background:#111;
      color:#fff;
      border:none;
      padding:18px 35px;
      font-size:15px;
      cursor:pointer;
      transition:0.3s;
      letter-spacing:1px;
    }

    .checkout-btn:hover{
      opacity:0.85;
    }

    .empty{
      font-size:18px;
      color:#666;
      text-align:center;
      margin-top:80px;
    }

    @media(max-width:768px){

      body{
        padding:20px;
      }

      .item{
        flex-direction:column;
        align-items:flex-start;
      }

      .item img{
        width:100%;
        height:auto;
      }

      .cart-footer{
        flex-direction:column;
        gap:20px;
        align-items:flex-start;
      }

    }

  </style>
</head>
<body>
<header class="navbar">

  <div class="container navbar-container">

    <a href="index.html" class="logo">

      <img 
        src="https://cdn.dribbble.com/userupload/3165307/file/original-8e481ab283e1c5581937e04d4cde539e.jpg"
        alt="UrbanWear Logo"
      >

      <span>URBANWEAR</span>

    </a>

    <nav>

      <ul class="nav-links">

        <li>
          <a href="index.html">
            Home
          </a>
        </li>

        <li>
          <a href="produtos.html">
            Coleção
          </a>
        </li>

        <li>
          <a href="carrinho.html">
            Carrinho
          </a>
        </li>

      </ul>

    </nav>

  </div>

</header>
  <header class="cart-header">
    <h1>CARRINHO</h1>

    <a href="produtos.html" class="back-btn">
      Continuar comprando
    </a>
  </header>

  <div id="cart-items"></div>

  <footer class="cart-footer">

    <div class="total">
      Total: <span id="total-price">R$ 0,00</span>
    </div>

    <button class="checkout-btn">
      FINALIZAR COMPRA
    </button>

  </footer>


<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

const container = document.getElementById("cart-items");
const totalPrice = document.getElementById("total-price");

function renderCart(){

  container.innerHTML = "";

  let total = 0;

  if(cart.length === 0){

    container.innerHTML = `
      <p class="empty">
        Seu carrinho está vazio.
      </p>
    `;

    totalPrice.innerText = "R$ 0,00";

    return;
  }

  cart.forEach((product, index) => {

    const numericPrice = Number(
      product.price
      .replace("R$", "")
      .replace(".", "")
      .replace(",", ".")
      .trim()
    );

    total += numericPrice;

    const item = document.createElement("div");

    item.classList.add("item");

    item.innerHTML = `
    
      <img src="${product.image}" alt="${product.name}">

      <div class="item-info">

        <p class="category">UrbanWear Collection</p>

        <h3>${product.name}</h3>

        <p class="price">${product.price}</p>

        <button class="remove-btn">
          Remover
        </button>

      </div>
    `;

    const removeButton = item.querySelector(".remove-btn");

    removeButton.addEventListener("click", () => {

      removeItem(index);

    });

    container.appendChild(item);

  });

  totalPrice.innerText = total.toLocaleString("pt-BR", {
    style: "currency",
    currency: "BRL"
  });

}

function removeItem(index){

  cart.splice(index, 1);

  localStorage.setItem("cart", JSON.stringify(cart));

  renderCart();

}

renderCart();

</script>

</body>
</html>
