<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Carrinho - UrbanWear</title>

<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/card.css">

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f5f5f5;
}

.carrinho{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.carrinho-box{
    background:white;
    padding:40px;
    border-radius:20px;
    width:500px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.1);
}

.carrinho-box h1{
    margin-bottom:20px;
}

.carrinho-box h3{
    margin-bottom:15px;
}

.carrinho-box p{
    color:#666;
    margin-bottom:25px;
}

.btn-cart{
  display:inline-block;
  padding:12px 25px;
  background:#2563eb;
  color:white;
  text-decoration:none;
  border-radius:30px;
  font-weight:bold;
  transition:.3s;
}

.btn-cart:hover{
 background:#1d4ed8;
}
</style>

</head>

<body>

<section class="carrinho">

<div class="carrinho-box">

<h1>🛒 Meu Carrinho</h1>

<h3>Seu produto foi adicionado!</h3>

<p>
Continue comprando ou finalize seu pedido.
</p>

<a href="index.html" class="btn-cart">
Voltar à loja
</a>

</div>

</section>

</body>
</html>
